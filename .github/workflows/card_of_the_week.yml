name: Card of the Week

on:
  schedule:
    # Runs every Monday at 6:00 PM UTC (1 PM CDT / 12 PM CST)
    - cron: "0 18 * * 1,5"

  # Allows you to trigger a test run manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  post-card:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit history.json back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run card of the week script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python card_of_the_week.py

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "Update card history"
          git push
