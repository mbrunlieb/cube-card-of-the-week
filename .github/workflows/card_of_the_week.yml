name: Card of the Week

on:
  schedule:
    # Card of the Week — Mondays at 6:00 PM UTC (1 PM CDT / 12 PM CST)
    - cron: "0 18 * * 1"
    # Trophy Battle — Fridays at 6:00 PM UTC (1 PM CDT / 12 PM CST)
    - cron: "0 18 * * 5"

  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: true
        default: 'card-of-the-week'
        type: choice
        options:
          - card-of-the-week
          - trophy-battle
          - scrape-trophies

jobs:
  card-of-the-week:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 18 * * 1' || github.event_name == 'workflow_dispatch' && inputs.job == 'card-of-the-week'

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run trophy battle script
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python trophy_battle.py

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "Update card history"
          git push

  trophy-battle:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 18 * * 5' || github.event_name == 'workflow_dispatch' && inputs.job == 'trophy-battle'

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run trophy battle script
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          CLASH_URL: ${{ secrets.CLASH_URL }}
          CLASH_SECRET: ${{ secrets.CLASH_SECRET }}
        run: python trophy_battle.py

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trophy_battle_history.json
          git diff --staged --quiet || git commit -m "Update trophy battle history"
          git push

  scrape-trophies:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'scrape-trophies'

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run trophy scraper
        run: python scrape_trophies.py

      - name: Commit updated trophy decks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trophy_decks.json
          git diff --staged --quiet || git commit -m "Update trophy decks"
          git push
